<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dineo - Our Menu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f1f5f9; color: #1e293b; }

    .header { background: #1e293b; color: white; padding: 24px; text-align: center; }
    .header h1 { font-size: 28px; margin-bottom: 6px; }
    .header p { font-size: 14px; color: #94a3b8; }

    .cat-bar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
    .cat-btn {
      padding: 6px 16px; border-radius: 99px; font-size: 13px; font-weight: bold;
      border: 2px solid #475569; background: transparent; color: #94a3b8; cursor: pointer;
    }
    .cat-btn:hover { border-color: #3b82f6; color: white; }
    .cat-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }

    .filter-bar { display: flex; gap: 10px; align-items: center; padding: 16px 24px; flex-wrap: wrap; }
    .filter-bar input {
      padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 6px;
      font-size: 13px; outline: none; width: 200px;
    }
    .filter-bar input:focus { border-color: #3b82f6; }
    .toggle-btn {
      padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: bold;
      border: 1px solid #e2e8f0; background: white; color: #64748b; cursor: pointer;
    }
    .toggle-btn.active { background: #eff6ff; border-color: #3b82f6; color: #3b82f6; }

    .content { max-width: 1100px; margin: 0 auto; padding: 16px 24px 40px; }

    .section-title { font-size: 18px; font-weight: bold; margin: 24px 0 12px; color: #1e293b; }

    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

    .menu-card { background: white; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
    .menu-card.sold-out { opacity: 0.5; }
    .card-img { width: 100%; height: 160px; object-fit: cover; background: #f1f5f9; display: block; }
    .card-body { padding: 12px 14px; }
    .card-name { font-size: 15px; font-weight: bold; margin-bottom: 4px; }
    .card-price { font-size: 16px; font-weight: bold; color: #3b82f6; margin-bottom: 6px; }
    .card-allergens { font-size: 12px; color: #94a3b8; margin-bottom: 10px; }
    .card-status { font-size: 12px; font-weight: bold; padding: 3px 10px; border-radius: 99px; display: inline-block; }
    .s-ok { background: #f0fdf4; color: #16a34a; }
    .s-low { background: #fffbeb; color: #d97706; }
    .s-out { background: #fef2f2; color: #dc2626; }

    .empty { text-align: center; padding: 50px; color: #94a3b8; }

    .footer { text-align: center; padding: 24px; color: #94a3b8; font-size: 13px; border-top: 1px solid #e2e8f0; }
    .footer a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>

<div class="header">
  <h1>Dineo</h1>
  <p>Fresh ingredients, made to order</p>
  <div class="cat-bar" id="cat-bar">
    <button class="cat-btn active" onclick="setCategory('all', this)">All</button>
  </div>
</div>

<div class="filter-bar">
  <button class="toggle-btn active" id="available-btn" onclick="toggleAvailable()">Available Only</button>
  <input type="text" id="search" placeholder="Search menu..." oninput="renderMenu()"/>
</div>

<div class="content">
  <div id="menu-container"></div>
</div>

<div class="footer">
  <a href="/">Back to Admin</a>
</div>

<script>
  const API = '/api';

  let items = [];
  let categories = [];
  let activeCategory = 'all';
  let availableOnly = true;

  async function loadData() {
    try {
      const itemResponse = await fetch(API + '/items');
      items = await itemResponse.json();

      const catResponse = await fetch(API + '/categories');
      categories = await catResponse.json();

      buildCategoryButtons();
      renderMenu();
    } catch (e) {
      document.getElementById('menu-container').innerHTML =
        '<div class="empty"><h3>Could not connect to server.</h3></div>';
    }
  }

  function buildCategoryButtons() {
    const bar = document.getElementById('cat-bar');
    bar.innerHTML = '<button class="cat-btn active" onclick="setCategory(\'all\', this)">All</button>';

    for (let i = 0; i < categories.length; i++) {
      const cat = categories[i];
      const btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.textContent = cat.name;
      btn.onclick = function() { setCategory(cat.id, btn); };
      bar.appendChild(btn);
    }
  }

  function setCategory(id, btn) {
    activeCategory = id;
    const allBtns = document.querySelectorAll('.cat-btn');
    for (let i = 0; i < allBtns.length; i++) allBtns[i].classList.remove('active');
    btn.classList.add('active');
    renderMenu();
  }

  function toggleAvailable() {
    availableOnly = !availableOnly;
    const btn = document.getElementById('available-btn');
    if (availableOnly) btn.classList.add('active'); else btn.classList.remove('active');
    renderMenu();
  }

  function getStatus(item) {
    if (item.stock === 0) return 'out';
    if (item.stock < item.threshold) return 'low';
    return 'ok';
  }

  function getStatusLabel(status) {
    if (status === 'ok') return 'In Stock';
    if (status === 'low') return 'Low Stock';
    if (status === 'out') return 'Sold Out';
    return '';
  }

  function renderMenu() {
    const search = document.getElementById('search').value.toLowerCase();
    const container = document.getElementById('menu-container');
    container.innerHTML = '';

    const filtered = [];
    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      const catMatch = activeCategory === 'all' || (item.category && item.category.id === activeCategory);
      const availMatch = !availableOnly || item.stock > 0;
      const searchMatch = search === '' || item.name.toLowerCase().includes(search);
      if (catMatch && availMatch && searchMatch) filtered.push(item);
    }

    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty"><h3>No items found.</h3></div>';
      return;
    }

    // group by category
    const groups = {};
    for (let i = 0; i < filtered.length; i++) {
      const item = filtered[i];
      const catName = item.category ? item.category.name : 'Other';
      if (!groups[catName]) groups[catName] = [];
      groups[catName].push(item);
    }

    const catNames = Object.keys(groups);
    for (let i = 0; i < catNames.length; i++) {
      const catName = catNames[i];
      const catItems = groups[catName];

      const heading = document.createElement('div');
      heading.className = 'section-title';
      heading.textContent = catName + ' (' + catItems.length + ')';
      container.appendChild(heading);

      const grid = document.createElement('div');
      grid.className = 'card-grid';

      for (let j = 0; j < catItems.length; j++) {
        const item = catItems[j];
        const status = getStatus(item);
        const label = getStatusLabel(status);
        const imgSrc = item.image || 'https://placehold.co/400x300/f1f5f9/94a3b8?text=No+Image';
        const allergens = (item.allergens && item.allergens !== 'none') ? item.allergens : 'No allergens';

        const card = document.createElement('div');
        card.className = 'menu-card' + (status === 'out' ? ' sold-out' : '');
        card.innerHTML =
          '<img class="card-img" src="' + imgSrc + '" onerror="this.src=\'https://placehold.co/400x300/f1f5f9/94a3b8?text=No+Image\'" alt="' + item.name + '"/>' +
          '<div class="card-body">' +
            '<div class="card-name">' + item.name + '</div>' +
            '<div class="card-price">$' + item.price.toFixed(2) + '</div>' +
            '<div class="card-allergens">' + allergens + '</div>' +
            '<span class="card-status s-' + status + '">' + label + '</span>' +
          '</div>';
        grid.appendChild(card);
      }

      container.appendChild(grid);
    }
  }

  loadData();
</script>
</body>
</html>
